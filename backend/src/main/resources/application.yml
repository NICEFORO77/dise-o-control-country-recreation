spring:
  application:
    name: control-interno-heliconias
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/heliconias_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    create-schemas: true
    default-schema: heliconias
    schemas:
      - heliconias
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

server:
  port: ${SERVER_PORT:8080}

app:
  security:
    jwt-secret: ${JWT_SECRET:ZmFjdHVyYWNpb25faGVsaWNvbmlhc19wdWNhbGxwYV9qd3Rfc2VjcmV0XzIwMjY=}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  uploads:
    directory: ${UPLOAD_DIR:uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
